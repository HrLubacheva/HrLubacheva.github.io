<section aria-labelledby="stats-title">
    <div class="container">
        <h2 class="section-title fade-up" id="stats-title">Результаты в цифрах</h2>
        <dl class="stats-grid" role="list">
            <!-- 1. Года в HR -->
            <div class="stat-item fade-up" role="listitem" itemscope itemtype="https://schema.org/QuantitativeValue">
                <dt class="stat-number-wrapper">
                    <span class="stat-number" data-target="24" aria-hidden="true">0</span>
                    <span class="visually-hidden">24</span>
                </dt>
                <dd class="stat-label" itemprop="name">года в HR</dd>
                <meta itemprop="value" content="24">
            </div>

            <!-- 2. Вакансий закрыто -->
            <div class="stat-item fade-up" role="listitem" itemscope itemtype="https://schema.org/QuantitativeValue">
                <dt class="stat-number-wrapper">
                    <span class="stat-number" data-target="1000" aria-hidden="true">0</span><span class="stat-plus" aria-hidden="true">+</span>
                    <span class="visually-hidden">более 1000</span>
                </dt>
                <dd class="stat-label" itemprop="name">вакансий закрыто</dd>
                <meta itemprop="value" content="1000">
            </div>

            <!-- 3. Кандидатов трудоустроено -->
            <div class="stat-item fade-up" role="listitem" itemscope itemtype="https://schema.org/QuantitativeValue">
                <dt class="stat-number-wrapper">
                    <span class="stat-number" data-target="1500" aria-hidden="true">0</span><span class="stat-plus" aria-hidden="true">+</span>
                    <span class="visually-hidden">более 1500</span>
                </dt>
                <dd class="stat-label" itemprop="name">кандидатов трудоустроено</dd>
                <meta itemprop="value" content="1500">
            </div>

            <!-- 4. Интервью -->
            <div class="stat-item fade-up" role="listitem" itemscope itemtype="https://schema.org/QuantitativeValue">
                <dt class="stat-number-wrapper">
                    <span class="stat-number" data-target="10000" aria-hidden="true">0</span><span class="stat-plus" aria-hidden="true">+</span>
                    <span class="visually-hidden">более 10000</span>
                </dt>
                <dd class="stat-label" itemprop="name">интервью</dd>
                <meta itemprop="value" content="10000">
            </div>

            <!-- 5. Карьерных консультаций -->
            <div class="stat-item fade-up" role="listitem" itemscope itemtype="https://schema.org/QuantitativeValue">
                <dt class="stat-number-wrapper">
                    <span class="stat-number" data-target="500" aria-hidden="true">0</span><span class="stat-plus" aria-hidden="true">+</span>
                    <span class="visually-hidden">более 500</span>
                </dt>
                <dd class="stat-label" itemprop="name">карьерных консультаций</dd>
                <meta itemprop="value" content="500">
            </div>

            <!-- 6. Тренингов проведено -->
            <div class="stat-item fade-up" role="listitem" itemscope itemtype="https://schema.org/QuantitativeValue">
                <dt class="stat-number-wrapper">
                    <span class="stat-number" data-target="35" aria-hidden="true">0</span><span class="stat-plus" aria-hidden="true">+</span>
                    <span class="visually-hidden">более 35</span>
                </dt>
                <dd class="stat-label" itemprop="name">тренингов проведено</dd>
                <meta itemprop="value" content="35">
            </div>
        </dl>
    </div>
</section>
