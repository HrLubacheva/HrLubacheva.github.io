<section id="calendar">
    <div class="container">
        <div class="calendar-card fade-up">
            <h2 class="section-title">
                📋 Экспресс-диагностика 15 минут
                <span style="font-size: 0.8rem; display: block; color: var(--primary); font-weight: normal;">Разберём вашу ситуацию — без обязательств</span>
            </h2>

            <div style="text-align: center; margin-bottom: 24px;">
                <p style="font-size: 1rem;">Для соискателей, специалистов, руководителей и бизнеса.</p>
                <p style="font-size: 0.9rem; color: var(--secondary); margin-top: 8px;">Найдём точки роста, дадим рекомендации и предложим решение.</p>
                <div style="display: flex; justify-content: center; gap: 24px; flex-wrap: wrap; margin-top: 16px;">
                    <span>🔒 Конфиденциально</span>
                    <span>⏱️ 15 минут</span>
                    <span>🤝 Без обязательств</span>
                </div>
            </div>

            <form id="callbackForm" class="callback-form responsive-form">
                <div class="form-row">
                    <input type="text" id="callbackName" name="name" placeholder="👤 Ваше имя">
                    <input type="tel" id="callbackPhone" name="phone" placeholder="📞 +7 912 345 67 89" inputmode="numeric" required>
                </div>

                <!-- Email теперь в той же строке, что и телефон? Нет, лучше сделаем отдельную строку, но компактнее -->
                <input type="email" id="callbackEmail" name="email" placeholder="📧 Email (необязательно)" style="margin-bottom: 16px;">

                <div id="quizSelectionBlock" class="calc-item" style="display: none;">
                    <div class="service-name"></div>
                    <div class="service-price"></div>
                    <div class="service-remove">
                        <button type="button" id="removeQuizSelection" class="remove-item">✖</button>
                    </div>
                </div>

                <input type="hidden" name="chosenVariant" id="chosenVariant">
                <input type="hidden" name="chosenVariantPrice" id="chosenVariantPrice">
                <input type="hidden" name="originalChosenVariant" id="originalChosenVariant">
                <input type="hidden" name="originalChosenVariantPrice" id="originalChosenVariantPrice">
                <input type="hidden" name="recommendedVariants" id="recommendedVariants">
                <input type="hidden" name="quizAnswersRaw" id="quizAnswersRaw">

                <textarea id="callbackComment" name="comment" rows="3" placeholder="💬 Удобное время или дополнительная информация"></textarea>

                <div class="consent-checkbox">
                    <input type="checkbox" id="callbackConsent" name="consent" required>
                    <label for="callbackConsent">Я согласен на <a href="privacy.html" target="_blank">обработку персональных данных</a></label>
                </div>

                <button type="submit" class="btn-primary btn-block">📋 Записаться →</button>
            </form>

            <p class="callback-note" style="margin-top: 16px; font-size: 0.8rem;">
                После отправки мы свяжемся с вами для уточнения времени.
            </p>
        </div>
    </div>
</section>
