<div class="calendar-card">
    <h3 class="text-center">📞 Быстрый заказ</h3>
    <p class="text-center text-muted-light">Оставьте телефон, и я перезвоню, чтобы обсудить выбранные услуги.</p>
    <form id="quickOrderForm" class="callback-form" novalidate>
        <fieldset>
            <legend class="visually-hidden">Быстрый заказ</legend>
            <div class="form-row-two">
                <input type="text" id="quickName" name="name" placeholder="👤 Имя" autocomplete="name" class="form-field">
                <input type="tel" id="quickPhone" name="phone" placeholder="📞 Телефон" inputmode="numeric" required autocomplete="tel" class="form-field">
            </div>

            <!-- ЯВНЫЕ СКРЫТЫЕ ПОЛЯ ДЛЯ КВИЗА (те же, что и в обратной связи) -->
            <input type="hidden" name="quiz_q1_role" id="quiz_q1_role_quick">
            <input type="hidden" name="quiz_q2_level" id="quiz_q2_level_quick">
            <input type="hidden" name="quiz_q3_urgency" id="quiz_q3_urgency_quick">
            <input type="hidden" name="quiz_q4_importance" id="quiz_q4_importance_quick">
            <input type="hidden" name="quiz_q5_budget" id="quiz_q5_budget_quick">
            <input type="hidden" name="quiz_q6_industry" id="quiz_q6_industry_quick">
            <input type="hidden" name="quiz_q7_work_format" id="quiz_q7_work_format_quick">
            <input type="hidden" name="quiz_recommendations" id="quiz_recommendations_quick">
            <input type="hidden" name="quiz_chosen_variant" id="quiz_chosen_variant_quick">
            <input type="hidden" name="quiz_chosen_price" id="quiz_chosen_price_quick">

            <!-- СТАРЫЕ ПОЛЯ ДЛЯ СОВМЕСТИМОСТИ -->
            <input type="hidden" name="chosenVariant" id="chosenVariantQuick">
            <input type="hidden" name="chosenVariantPrice" id="chosenVariantPriceQuick">
            <input type="hidden" name="originalChosenVariant" id="originalChosenVariantQuick">
            <input type="hidden" name="originalChosenVariantPrice" id="originalChosenVariantPriceQuick">
            <input type="hidden" name="recommendedVariants" id="recommendedVariantsQuick">
            <input type="hidden" name="quizAnswersRaw" id="quizAnswersRawQuick">

            <div class="form-row-messages">
                <div class="consent-checkbox">
                    <input type="checkbox" id="quickConsent" name="consent" required>
                    <label for="quickConsent">Я согласен на <a href="privacy.html" target="_blank">обработку персональных данных</a></label>
                </div>
                <div id="quickFormMessages" class="form-messages" role="alert" aria-live="polite"></div>
            </div>
            <button type="submit" class="btn btn-primary btn-block callback-submit" aria-label="Заказать звонок">📞 Заказать звонок</button>
            <div class="callback-telegram-alt">
                ✨ Или напишите мне в <a href="https://t.me/HrLubacheva" target="_blank" rel="noopener noreferrer">Telegram</a>
            </div>
        </fieldset>
    </form>
    <p class="callback-note">После отправки мы свяжемся с вами.</p>
</div>
