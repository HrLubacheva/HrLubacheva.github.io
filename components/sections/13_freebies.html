<script>
    (function() {
        if (window.APP_CONFIG) {
            const cfg = window.APP_CONFIG;
            const checklistLink = document.querySelector('.checklist-download');
            const trainingLink = document.querySelector('.training-download');
            const zipLink = document.querySelector('.zip-download');
            if (checklistLink && cfg.CHECKLIST_URL) checklistLink.href = cfg.CHECKLIST_URL;
            if (trainingLink && cfg.TRAINING_PROGRAM_URL) trainingLink.href = cfg.TRAINING_PROGRAM_URL;
            if (zipLink && cfg.MATERIALS_ZIP_URL) zipLink.href = cfg.MATERIALS_ZIP_URL;
        }
    })();
</script>
