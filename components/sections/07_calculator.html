<section id="calculator">
    <div class="container">
        <div class="quiz-card fade-up">
            <h2 class="section-title">💰 Калькулятор стоимости услуг</h2>
            <p class="calculator-desc">Выберите категорию, добавьте услуги. Скидка 5% при заказе 2+ позиций из любого раздела.</p>

            <div class="calculator-tabs">
                <div style="display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 10px;">
                    <button class="tab-btn active" data-tab="business-recruitment">👥 Поиск сотрудников</button>
                    <button class="tab-btn" data-tab="business-retention">🏆 Удержание и развитие</button>
                    <button class="tab-btn" data-tab="corporate">🎓 Тренинги для бизнеса</button>
                </div>
                <div style="display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 10px;">
                    <button class="tab-btn" data-tab="individual-base">👤 Базовые (до 10 000 ₽)</button>
                    <button class="tab-btn" data-tab="individual-standard">👤 Стандартные</button>
                    <button class="tab-btn" data-tab="individual-premium">👤 Премиальные</button>
                    <button class="tab-btn" data-tab="training">🚀 Тренинг "Продай себя дорого"</button>
                </div>
            </div>

            <!-- Вкладка Поиск сотрудников (активна по умолчанию) -->
            <div id="tab-business-recruitment" class="tab-pane active">
                <div class="add-service">
                    <select id="business-recruitment-select" class="service-select" aria-label="Выберите услугу по поиску сотрудников">
                        <option value="">Загрузка...</option>
                    </select>
                    <input type="number" id="business-recruitment-qty" min="1" value="1" class="calc-qty" aria-label="Количество услуг для категории Поиск сотрудников">
                    <button id="business-recruitment-add" class="btn-primary add-service-btn" aria-label="Добавить услугу">➕ Добавить</button>
                </div>
                <div class="calc-pdf-section" style="visibility: hidden; height: 0; margin: 0; padding: 0;"></div>
            </div>

            <!-- Вкладка Удержание и развитие -->
            <div id="tab-business-retention" class="tab-pane">
                <div class="add-service">
                    <select id="business-retention-select" class="service-select" aria-label="Выберите услугу по удержанию и развитию">
                        <option value="">Загрузка...</option>
                    </select>
                    <input type="number" id="business-retention-qty" min="1" value="1" class="calc-qty" aria-label="Количество услуг для категории Удержание и развитие">
                    <button id="business-retention-add" class="btn-primary add-service-btn" aria-label="Добавить услугу">➕ Добавить</button>
                </div>
                <div class="calc-pdf-section" style="visibility: hidden; height: 0; margin: 0; padding: 0;"></div>
            </div>

            <!-- Вкладка Базовые -->
            <div id="tab-individual-base" class="tab-pane">
                <div class="add-service">
                    <select id="individual-base-select" class="service-select" aria-label="Выберите базовую услугу (до 10 000 ₽)">
                        <option value="">Загрузка...</option>
                    </select>
                    <input type="number" id="individual-base-qty" min="1" value="1" class="calc-qty" aria-label="Количество базовых услуг">
                    <button id="individual-base-add" class="btn-primary add-service-btn" aria-label="Добавить услугу">➕ Добавить</button>
                </div>
            </div>

            <!-- Вкладка Стандартные -->
            <div id="tab-individual-standard" class="tab-pane">
                <div class="add-service">
                    <select id="individual-standard-select" class="service-select" aria-label="Выберите стандартную услугу">
                        <option value="">Загрузка...</option>
                    </select>
                    <input type="number" id="individual-standard-qty" min="1" value="1" class="calc-qty" aria-label="Количество стандартных услуг">
                    <button id="individual-standard-add" class="btn-primary add-service-btn" aria-label="Добавить услугу">➕ Добавить</button>
                </div>
            </div>

            <!-- Вкладка Премиальные -->
            <div id="tab-individual-premium" class="tab-pane">
                <div class="add-service">
                    <select id="individual-premium-select" class="service-select" aria-label="Выберите премиальную услугу">
                        <option value="">Загрузка...</option>
                    </select>
                    <input type="number" id="individual-premium-qty" min="1" value="1" class="calc-qty" aria-label="Количество премиальных услуг">
                    <button id="individual-premium-add" class="btn-primary add-service-btn" aria-label="Добавить услугу">➕ Добавить</button>
                </div>
            </div>

            <!-- Вкладка Тренинг "Продай себя дорого" -->
            <div id="tab-training" class="tab-pane">
                <div class="add-service">
                    <select id="training-select" class="service-select" aria-label="Выберите формат тренинга">
                        <option value="">Загрузка...</option>
                    </select>
                    <input type="number" id="training-qty" min="1" value="1" class="calc-qty" aria-label="Количество мест на тренинге">
                    <button id="training-add" class="btn-primary add-service-btn" aria-label="Добавить тренинг">➕ Добавить</button>
                </div>
            </div>

            <!-- Вкладка Тренинги для бизнеса -->
            <div id="tab-corporate" class="tab-pane">
                <div class="add-service">
                    <select id="corporate-select" class="service-select" aria-label="Выберите корпоративный тренинг">
                        <option value="">Загрузка...</option>
                    </select>
                    <input type="number" id="corporate-qty" min="1" value="1" class="calc-qty" aria-label="Количество тренингов">
                    <button id="corporate-add" class="btn-primary add-service-btn" aria-label="Добавить тренинг">➕ Добавить</button>
                </div>
                <div class="calc-pdf-section" style="visibility: hidden; height: 0; margin: 0; padding: 0;"></div>
            </div>

            <!-- Итог и корзина -->
            <div class="total-block">
                <div>💰 Итого: <span id="totalPrice">0 ₽</span></div>
                <div id="discountInfo" class="discount-info"></div>
            </div>

            <div class="cart-section">
                <h3>🛒 Выбранные услуги</h3>
                <div id="business-list" class="services-list"></div>
                <div id="individual-list" class="services-list"></div>
                <div id="corporate-list" class="services-list"></div>
                <div id="training-list" class="services-list"></div>
            </div>

            <!-- Быстрый заказ (адаптивная форма) -->
            <div class="calendar-card" style="margin-top: 40px; padding: 32px; background: linear-gradient(145deg, #ffffff 0%, #f8faff 100%); border-radius: 28px; box-shadow: 0 8px 24px rgba(0,0,0,0.1);">
                <h3 style="font-size: 1.4rem; margin-bottom: 16px; color: var(--primary-dark); text-align: center;">📞 Быстрый заказ</h3>
                <p style="margin-bottom: 24px; color: var(--secondary); text-align: center;">Оставьте контакты, и я перезвоню, чтобы обсудить выбранные услуги.</p>
                <form id="quickOrderForm" class="callback-form responsive-form">
                    <div class="form-row">
                        <input type="text" id="quickName" name="name" placeholder="👤 Ваше имя (необязательно)" aria-label="Ваше имя">
                        <input type="tel" id="quickPhone" name="phone" placeholder="📞 +7 912 345 67 89" required aria-label="Номер телефона">
                    </div>

                    <!-- Скрытые поля для данных квиза -->
                    <input type="hidden" name="chosenVariant" id="quickChosenVariant">
                    <input type="hidden" name="chosenVariantPrice" id="quickChosenVariantPrice">
                    <input type="hidden" name="originalChosenVariant" id="quickOriginalChosenVariant">
                    <input type="hidden" name="originalChosenVariantPrice" id="quickOriginalChosenVariantPrice">
                    <input type="hidden" name="recommendedVariants" id="quickRecommendedVariants">
                    <input type="hidden" name="quizAnswersRaw" id="quickQuizAnswersRaw">

                    <div class="consent-checkbox" style="margin: 20px 0;">
                        <input type="checkbox" id="quickConsent" name="consent" required aria-label="Согласие на обработку персональных данных">
                        <label for="quickConsent">Я согласен на <a href="privacy.html" target="_blank">обработку персональных данных</a></label>
                    </div>

                    <button type="submit" class="btn-primary btn-block" aria-label="Заказать звонок">📞 Заказать звонок</button>
                </form>
            </div>
        </div>
    </div>
</section>
