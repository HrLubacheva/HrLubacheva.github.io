<section id="calculator">
    <div class="container">
        <div class="quiz-card fade-up">
            <h2 class="section-title">💰 Калькулятор стоимости услуг</h2>
            <p class="">Выберите категорию, добавьте услуги. Скидка 5% при заказе 2+ позиций из любого раздела.</p>
            <div class="calculator-tabs">
                <button class="tab-btn active" data-tab="business">🏢&nbsp;Бизнесу</button>
                <button class="tab-btn" data-tab="individual">👤&nbsp;Индивидуально</button>
                <button class="tab-btn" data-tab="corporate">🎓&nbsp;Тренинги для бизнеса</button>
                <button class="tab-btn" data-tab="group">👥&nbsp;Групповые тренинги</button>
            </div>
            <div id="tab-business" class="tab-pane active">
                <div id="business-list"></div>
                <div class="add-service">
                    <select id="business-select">
                        <option value="60000">Подбор специалиста — 60&nbsp;000 ₽</option>
                        <option value="90000">Подбор руководителя — 90&nbsp;000 ₽</option>
                        <option value="120000">Хэдхантинг — 120&nbsp;000 ₽</option>
                        <option value="250000">Онбординг — 250&nbsp;000 ₽</option>
                        <option value="25000">УТП компании — 25&nbsp;000 ₽</option>
                    </select>
                    <input type="number" id="business-qty" min="1" value="1" class="calc-qty">
                    <button id="business-add" class="btn-primary add-service-btn">➕ Добавить</button>
                </div>
            </div>
            <div id="tab-individual" class="tab-pane">
                <div id="individual-list"></div>
                <div class="add-service">
                    <select id="individual-select">
                        <option value="7000">Индивидуальная консультация (1ч) — 7&nbsp;000 ₽</option>
                        <option value="3500">Экспресс-консультация (30мин) — 3&nbsp;500 ₽</option>
                        <option value="4000">Аудит резюме — 4&nbsp;000 ₽</option>
                        <option value="6000">Резюме специалиста — 6&nbsp;000 ₽</option>
                        <option value="9000">Резюме руководителя — 9&nbsp;000 ₽</option>
                        <option value="15000">CV на английском — 15&nbsp;000 ₽</option>
                        <option value="3000">Сопроводительное письмо — 3&nbsp;000 ₽</option>
                        <option value="14000">Индивидуальный тренинг «Продай себя дорого» — 14&nbsp;000 ₽</option>
                    </select>
                    <input type="number" id="individual-qty" min="1" value="1" class="calc-qty">
                    <button id="individual-add" class="btn-primary add-service-btn">➕ Добавить</button>
                </div>
                <div class="calc-pdf-section">
                    <a href="assets/docs/checklist.pdf" class="btn-secondary" target="_blank">📄 Скачать чек-лист (PDF)</a>
                    <a href="assets/docs/training_program.pdf" class="btn-secondary" target="_blank">📘 Скачать программу тренинга (PDF)</a>
                </div>
            </div>
            <div id="tab-corporate" class="tab-pane">
                <div id="corporate-list"></div>
                <div class="add-service">
                    <select id="corporate-select">
                        <option value="12000">Тренинг по запросу (до 25 чел.) — 12&nbsp;000 ₽</option>
                        <option value="13000">Стратегическая сессия (до 12 чел.) — 13&nbsp;000 ₽</option>
                        <option value="30000">Мастер-класс (3ч. до 25 чел.) — 30&nbsp;000 ₽</option>
                    </select>
                    <input type="number" id="corporate-qty" min="1" value="1" class="calc-qty">
                    <button id="corporate-add" class="btn-primary add-service-btn">➕ Добавить</button>
                </div>
            </div>
            <div id="tab-group" class="tab-pane">
                <div id="group-list"></div>
                <div class="add-service">
                    <select id="group-select">
                        <option value="5500">Групповой тренинг (до 10 чел.) — 5&nbsp;500 ₽</option>
                        <option value="5000">Групповой тренинг (11-20 чел.) — 5&nbsp;000 ₽</option>
                        <option value="4500">Групповой тренинг (21+ чел.) — 4&nbsp;500 ₽</option>
                    </select>
                    <input type="number" id="group-qty" min="1" value="1" class="calc-qty">
                    <button id="group-add" class="btn-primary add-service-btn">➕ Добавить</button>
                </div>
            </div>
            <div class="total-block">
                <div>💰 Итого: <span id="totalPrice">0 ₽</span></div>
                <div id="discountInfo" class="discount-info"></div>
            </div>
        </div>
    </div>
</section>
