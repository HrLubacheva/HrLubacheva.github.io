<section id="calendar">
    <div class="container">
        <div class="calendar-card fade-up">
            <h2 class="section-title">📞 Бесплатная 20-минутная диагностика</h2>
            <p>Разберём вашу ситуацию: для соискателя — что мешает получить оффер выше; для бизнеса — почему вакансия не закрывается.</p>
            <form id="callbackForm" class="callback-form">
                <input type="text" id="callbackName" placeholder="👤 Ваше имя" required>
                <input type="tel" id="callbackPhone" placeholder="📞 +7 912 345 67 89" inputmode="numeric" required>
                <input type="email" id="callbackEmail" placeholder="📧 Email (необязательно)">
                <textarea id="callbackComment" rows="3" placeholder="💬 Удобное время для звонка или дополнительная информация"></textarea>
                <div class="consent-checkbox">
                    <input type="checkbox" id="callbackConsent" required>
                    <label for="callbackConsent">Я согласен на <a href="#" id="privacyLinkForm">обработку персональных данных</a></label>
                </div>
                <button type="submit" class="btn-primary">Заказать звонок</button>
            </form>
            <p class="callback-note">После отправки мы свяжемся с вами в рабочее время.</p>
        </div>
    </div>
</section>
