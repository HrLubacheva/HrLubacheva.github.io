<section id="calculator">
    <div class="container">
        <div class="quiz-card" style="margin-top:0;">
            <h2 class="section-title">💰 Калькулятор стоимости услуг</h2>
            <p>Выберите категорию, добавьте услуги. Скидка 5% при заказе 2+ позиций из любого раздела.</p>
            <div class="calculator-tabs">
                <button class="tab-btn active" data-tab="business">🏢 Бизнесу</button>
                <button class="tab-btn" data-tab="individual">👤 Индивидуально</button>
                <button class="tab-btn" data-tab="trainings">🎓 Тренинги</button>
            </div>
            <div id="tab-business" class="tab-pane active">
                <div id="business-list"></div>
                <div class="add-service">
                    <select id="business-select">
                        <option value="60000">Подбор специалиста — 60 000 ₽</option>
                        <option value="90000">Подбор руководителя — 90 000 ₽</option>
                        <option value="120000">Хэдхантинг — от 120 000 ₽</option>
                        <option value="250000">Онбординг — от 250 000 ₽</option>
                        <option value="25000">УТП компании — 25 000 ₽</option>
                    </select>
                    <input type="number" id="business-qty" min="1" value="1" style="width:80px;">
                    <button id="business-add" class="btn-primary" style="padding:10px 24px;">➕ Добавить</button>
                </div>
            </div>
            <div id="tab-individual" class="tab-pane">
                <div id="individual-list"></div>
                <div class="add-service">
                    <select id="individual-select">
                        <option value="7000">Индивидуальная консультация (1ч) — 7 000 ₽</option>
                        <option value="3500">Экспресс-консультация (30мин) — 3 500 ₽</option>
                        <option value="4000">Аудит резюме — 4 000 ₽</option>
                        <option value="6000">Резюме специалиста — 6 000 ₽</option>
                        <option value="9000">Резюме руководителя — 9 000 ₽</option>
                        <option value="15000">CV на английском — 15 000 ₽</option>
                        <option value="3000">Сопроводительное письмо — 3 000 ₽</option>
                        <option value="5500">Тренинг «Продай себя дорого» (включая АТС и ИИ) — 5 500 ₽</option>
                    </select>
                    <input type="number" id="individual-qty" min="1" value="1" style="width:80px;">
                    <button id="individual-add" class="btn-primary" style="padding:10px 24px;">➕ Добавить</button>
                </div>
                <div style="margin-top:20px; text-align:center;">
                    <a href="#" class="btn-secondary" onclick="alert('Скачивание программы тренинга: добавьте ссылку на PDF')">📥 Скачать программу тренинга (PDF)</a>
                </div>
            </div>
            <div id="tab-trainings" class="tab-pane">
                <div id="trainings-list"></div>
                <div class="add-service">
                    <select id="trainings-select">
                        <option value="12000">Тренинг по запросу (до 25 чел.) — 12 000 ₽/час</option>
                        <option value="30000">Мастер-класс (3ч, до 25 чел.) — 30 000 ₽</option>
                        <option value="13000">Стратегическая сессия (до 12 чел.) — 13 000 ₽/час</option>
                    </select>
                    <input type="number" id="trainings-qty" min="1" value="1" style="width:80px;">
                    <button id="trainings-add" class="btn-primary" style="padding:10px 24px;">➕ Добавить</button>
                </div>
            </div>
            <div class="total-block">
                <div>Общая стоимость (с учётом скидки):</div>
                <div class="total-price" id="totalPrice">0 ₽</div>
                <div id="discountInfo" class="small-text">Скидка 5% при заказе 2+ услуг</div>
            </div>
        </div>
    </div>
</section>
