<div id="checklistModal" class="modal" style="display: none;">
    <div class="modal-content">
        <h3>📥 Получить бесплатные материалы</h3>
        <p>Введите ваш email, и мы отправим чек-лист и программу тренинга.</p>
        <input type="email" id="checklistEmail" placeholder="Ваш email" required style="width:100%; margin:15px 0; padding:12px; border-radius:40px; border:1px solid #ccc;">
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <label><input type="checkbox" id="checklistCheck" checked> Чек-лист «Идеальное резюме»</label>
            <label><input type="checkbox" id="trainingCheck" checked> Программа тренинга</label>
        </div>
        <div style="display: flex; gap: 10px; justify-content: flex-end;">
            <button id="downloadBothBtn" class="btn-primary">Скачать оба</button>
            <button id="closeModalBtn" class="btn-secondary">Закрыть</button>
        </div>
    </div>
</div>
