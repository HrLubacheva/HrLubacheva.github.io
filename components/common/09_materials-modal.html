<!-- Модальное окно для отправки материалов на email -->
<div id="materialsModal" class="modal" style="display: none;">
    <div class="modal-content">
        <h3>📧 Получить материалы на email</h3>
        <p>Введите ваш email, и мы отправим ссылки на скачивание.</p>
        <input type="email" id="materialsEmail" placeholder="Ваш email" class="modal-email-input">
        <div class="modal-buttons">
            <button id="sendMaterialsBtn" class="btn btn-primary">Отправить</button>
            <button id="closeMaterialsModal" class="btn btn-secondary">Закрыть</button>
        </div>
    </div>
</div>
